name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Prisma validate exige une URL non vide même sans connexion réelle.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run prisma:validate

      - name: Test handoff convive ↔ serveur (DB)
        if: ${{ secrets.DATABASE_URL != '' }}
        run: npm run test:handoff
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
